<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quản lý Nhà - Vân Nham (Lite)</title>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #eaf6ff;
            color: #333;
        }

        /* Header & Tabs */
        .tabs {
            display: flex;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            flex: 1;
            padding: 18px 0;
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: #888;
            background: none;
            border: none;
            border-bottom: 4px solid transparent;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #1976d2;
            border-bottom: 4px solid #1976d2;
        }
        .tab-content { display: none; padding: 15px 10px; max-width: 600px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* UI Cards */
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .card-title {
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            color: #1976d2;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Inputs & Buttons */
        label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fdfdfd;
            margin-bottom: 10px;
        }
        input:focus { outline: none; border: 2px solid #ff9800; }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 999px;
            background: #4caf50;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(76,175,80,0.4);
            margin-top: 10px;
        }
        .btn:active { transform: scale(0.98); }

        /* Result Styles */
        .result-box { background: #e9f5ff; border-radius: 16px; padding: 12px; text-align: center; }
        .value { font-size: 24px; font-weight: 800; color: #1976d2; }
        .final { 
            margin-top: 15px; border-radius: 16px; padding: 15px; 
            text-align: center; font-size: 18px; font-weight: bold; 
        }
        .ok { background: #e0f7e9; color: #1b5e20; }
        .no { background: #fff3e0; color: #bf360c; }
        .loading { color: #888; font-style: italic; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-thong-gio')">THÔNG GIÓ</button>
        <button class="tab-btn" onclick="switchTab('tab-thoi-tiet')">THỜI TIẾT</button>
    </div>

    <div id="tab-thong-gio" class="tab-content active">
        <div class="grid-2">
            <div class="card">
                <div class="card-title">TRONG NHÀ</div>
                <label>Nhiệt độ (°C)</label>
                <input id="nt" type="number" value="22" step="0.1">
                <label>Độ ẩm (%)</label>
                <input id="dt" type="number" value="73" step="1">
            </div>
            <div class="card">
                <div class="card-title">NGOÀI NHÀ</div>
                <label>Nhiệt độ (°C)</label>
                <input id="nn" type="number" value="28" step="0.1">
                <label>Độ ẩm (%)</label>
                <input id="dn" type="number" value="75" step="1">
            </div>
        </div>
        <button class="btn" onclick="tinhThongGio()">TÍNH TOÁN KẾT QUẢ</button>

        <div id="ketqua" class="card" style="display:none; margin-top:20px;">
            <div class="grid-2">
                <div class="result-box">
                    <p style="font-size:12px; margin:0">Ẩm tuyệt đối (T)</p>
                    <div id="daTrong" class="value">--</div>
                </div>
                <div class="result-box">
                    <p style="font-size:12px; margin:0">Ẩm tuyệt đối (N)</p>
                    <div id="daNgoai" class="value">--</div>
                </div>
            </div>
            <div id="final" class="final"></div>
        </div>
    </div>

    <div id="tab-thoi-tiet" class="tab-content">
        <div class="card">
            <div class="card-title">TRA CỨU VÂN NHAM</div>
            <label>Chọn ngày:</label>
            <select id="w-date"></select>
            <label>Chọn giờ:</label>
            <select id="w-hour"></select>
            <button class="btn" style="background:#1976d2;" onclick="fetchWeather()">LẤY DỮ LIỆU</button>
            
            <div id="w-loading" class="loading">Đang kết nối vệ tinh...</div>

            <div id="w-result" style="display:none; margin-top:20px; text-align:center;">
                <div class="grid-2">
                    <div class="result-box">
                        <label>NHIỆT ĐỘ</label>
                        <div id="res-temp" class="value" style="color:#ff9800">--°C</div>
                    </div>
                    <div class="result-box">
                        <label>ĐỘ ẨM</label>
                        <div id="res-hum" class="value" style="color:#ff9800">--%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        function layDoAmTuyetDoi(t, h) {
            let rT = Math.round(t) - 1; let rH = Math.round(h) - 60;
            rT = Math.max(0, Math.min(33, rT));
            rH = Math.max(0, Math.min(39, rH));
            return BANG_DO_AM[rT][rH];
        }

        function tinhNhietDoDiemSuong(da) {
            const table = [5.18,5.55,5.94,6.33,6.8,7.27,7.74,8.28,8.82,9.41,10.01,10.66,11.45,12.11,12.83,13.64,14.49,15.4,16.32,17.31,18.33,19.43,20.57,21.75,23.02,24.35,25.76,27.2,28.78,30.37];
            let idx = 0; for(let i=0; i<table.length; i++) { if(da >= table[i]) idx = i; else break; }
            return Math.round(da * (idx+1) / table[idx] * 10) / 10;
        }

        function tinhThongGio() {
            const nt = parseFloat(document.getElementById('nt').value);
            const dt = parseFloat(document.getElementById('dt').value);
            const nn = parseFloat(document.getElementById('nn').value);
            const dn = parseFloat(document.getElementById('dn').value);

            const dat = layDoAmTuyetDoi(nt, dt);
            const dan = layDoAmTuyetDoi(nn, dn);
            const ndt = tinhNhietDoDiemSuong(dat);
            const ndn = tinhNhietDoDiemSuong(dan);

            document.getElementById('daTrong').innerText = dat.toFixed(2);
            document.getElementById('daNgoai').innerText = dan.toFixed(2);

            let msg = "";
            if (nn > 32 || nn < 10) msg = "Không thông gió (Nhiệt độ ngoài giới hạn 10-32°C)";
            else if (dat <= dan) msg = "Không thông gió (Độ ẩm ngoài cao hơn)";
            else if (nn > nt && ndn >= nt) msg = "Không thông gió (Nguy cơ đọng sương trong nhà)";
            else if (nn <= nt && ndt >= nn) msg = "Không thông gió (Nguy cơ đọng sương ngoài nhà)";
            else msg = "Thông gió an toàn";

            const f = document.getElementById('final');
            f.innerText = msg;
            f.className = 'final ' + (msg.includes('Không') ? 'no' : 'ok');
            document.getElementById('ketqua').style.display = 'block';
        }

        // --- LOGIC THỜI TIẾT ---
        function initWeather() {
            const dSel = document.getElementById('w-date');
            const hSel = document.getElementById('w-hour');
            const now = new Date();
            for(let i=0; i<=7; i++) {
                let d = new Date(); d.setDate(now.getDate() - i);
                let s = d.toISOString().split('T')[0];
                dSel.innerHTML += `<option value="${s}">${i==0?'Hôm nay':d.toLocaleDateString('vi-VN')}</option>`;
            }
            for(let h=0; h<24; h++) {
                hSel.innerHTML += `<option value="${h}" ${h==14?'selected':''}>${h<10?'0'+h:h}:00</option>`;
            }
        }

        async function fetchWeather() {
            const date = document.getElementById('w-date').value;
            const hour = document.getElementById('w-hour').value;
            const load = document.getElementById('w-loading');
            const res = document.getElementById('w-result');
            load.style.display = 'block'; res.style.display = 'none';

            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=21.52&longitude=106.31&hourly=temperature_2m,relative_humidity_2m&timezone=Asia%2FBangkok&start_date=${date}&end_date=${date}`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('res-temp').innerText = data.hourly.temperature_2m[hour] + "°C";
                document.getElementById('res-hum').innerText = data.hourly.relative_humidity_2m[hour] + "%";
                load.style.display = 'none'; res.style.display = 'block';
            } catch (e) {
                alert("Lỗi kết nối mạng!");
                load.style.display = 'none';
            }
        }

        window.onload = initWeather;
    </script>
</body>
</html>
